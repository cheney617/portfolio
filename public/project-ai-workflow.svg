<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI 工作流">
  <defs>
    <linearGradient id="aiw-bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="oklch(28% 0.10 300)"/>
      <stop offset="0.55" stop-color="oklch(44% 0.16 298)"/>
      <stop offset="1" stop-color="oklch(62% 0.16 295)"/>
    </linearGradient>
    <linearGradient id="aiw-film" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.2" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.74" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.26"/>
    </linearGradient>
    <pattern id="aiw-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="aiw-mask" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0.3" stop-color="#fff"/><stop offset="0.75" stop-color="#000"/>
    </radialGradient>
    <mask id="aiw-gridmask"><rect width="800" height="400" fill="url(#aiw-mask)"/></mask>
    <clipPath id="aiw-clip"><rect width="800" height="400"/></clipPath>
  </defs>
  <g clip-path="url(#aiw-clip)">
    <rect width="800" height="400" fill="url(#aiw-bg)"/>
    <rect width="800" height="400" fill="url(#aiw-grid)" mask="url(#aiw-gridmask)"/>

    <!-- 节点流程图，居中 -->
    <g transform="translate(40 120)">
      <line x1="172" y1="70" x2="252" y2="70" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2.5"/>
      <polygon points="248,62 266,70 248,78" fill="#ffffff" fill-opacity="0.4"/>
      <line x1="452" y1="50" x2="560" y2="14" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2.5"/>
      <line x1="452" y1="90" x2="560" y2="126" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2.5"/>

      <!-- Input 节点 -->
      <rect x="0" y="40" width="172" height="60" rx="14" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.34" stroke-width="1.5"/>
      <rect x="28" y="60" width="80" height="8" rx="4" fill="#ffffff" fill-opacity="0.5"/>
      <rect x="28" y="76" width="52" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>

      <!-- AI 节点（高亮中枢） -->
      <rect x="266" y="20" width="186" height="100" rx="20" fill="#ffffff" fill-opacity="0.2" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
      <circle cx="359" cy="70" r="34" fill="#ffffff" fill-opacity="0.14"/>
      <path d="M359 42L367 62L387 70L367 78L359 98L351 78L331 70L351 62Z" fill="#ffffff"/>

      <!-- Pass 节点（绿勾） -->
      <rect x="560" y="-16" width="160" height="60" rx="14" fill="oklch(68% 0.16 160 / 0.34)" stroke="oklch(82% 0.13 160 / 0.65)" stroke-width="1.5"/>
      <path d="M588 16L600 28L624 4" stroke="#ffffff" stroke-opacity="0.92" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="640" y="8" width="60" height="8" rx="4" fill="#ffffff" fill-opacity="0.45"/>

      <!-- Review 节点（黄编辑） -->
      <rect x="560" y="96" width="160" height="60" rx="14" fill="oklch(78% 0.15 80 / 0.32)" stroke="oklch(85% 0.13 80 / 0.6)" stroke-width="1.5"/>
      <path d="M590 134L604 120L612 128L598 142H590V134Z" fill="#ffffff" fill-opacity="0.85"/>
      <rect x="624" y="122" width="64" height="8" rx="4" fill="#ffffff" fill-opacity="0.45"/>
      <rect x="624" y="136" width="44" height="8" rx="4" fill="#ffffff" fill-opacity="0.3"/>
    </g>

    <rect width="800" height="400" fill="url(#aiw-film)"/>
  </g>
</svg>