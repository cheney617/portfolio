<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="微信小程序增长 — 千万级 DAU">
  <defs>
    <linearGradient id="mp-bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="oklch(28% 0.08 215)"/>
      <stop offset="0.55" stop-color="oklch(44% 0.12 210)"/>
      <stop offset="1" stop-color="oklch(62% 0.13 205)"/>
    </linearGradient>
    <linearGradient id="mp-film" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.2" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.74" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.26"/>
    </linearGradient>
    <pattern id="mp-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="mp-mask" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0.3" stop-color="#fff"/><stop offset="0.75" stop-color="#000"/>
    </radialGradient>
    <mask id="mp-gridmask"><rect width="800" height="400" fill="url(#mp-mask)"/></mask>
    <clipPath id="mp-clip"><rect width="800" height="400"/></clipPath>
  </defs>
  <g clip-path="url(#mp-clip)">
    <rect width="800" height="400" fill="url(#mp-bg)"/>
    <rect width="800" height="400" fill="url(#mp-grid)" mask="url(#mp-gridmask)"/>

    <!-- 右侧统计 -->
    <text x="744" y="146" text-anchor="end" font-family="Geist, system-ui, sans-serif" font-size="76" font-weight="700" letter-spacing="-2" fill="#ffffff">10M+</text>
    <text x="744" y="188" text-anchor="end" font-family="Geist Mono, ui-monospace, monospace" font-size="20" fill="#ffffff" fill-opacity="0.64">CNY peak DAU</text>
    <text x="744" y="216" text-anchor="end" font-family="Geist Mono, ui-monospace, monospace" font-size="20" fill="#ffffff" fill-opacity="0.64">春节DAU</text>

    <!-- 小程序手机（白底） -->
    <g transform="translate(72 56) rotate(-3)">
      <rect x="0" y="0" width="188" height="306" rx="28" fill="#ffffff" stroke="#000000" stroke-opacity="0.08" stroke-width="2"/>
      <rect x="74" y="12" width="40" height="8" rx="4" fill="#e5e7eb"/>
      <!-- 微信绿 header -->
      <rect x="16" y="32" width="156" height="40" rx="10" fill="#07c160"/>
      <rect x="32" y="46" width="60" height="10" rx="5" fill="#ffffff" fill-opacity="0.85"/>
      <!-- 推荐位 -->
      <rect x="16" y="82" width="156" height="44" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
      <rect x="32" y="98" width="80" height="12" rx="6" fill="#16a34a" fill-opacity="0.3"/>
      <!-- 功能宫格 -->
      <rect x="16" y="136" width="74" height="52" rx="8" fill="#f9fafb"/>
      <rect x="98" y="136" width="74" height="52" rx="8" fill="#f9fafb"/>
      <rect x="16" y="196" width="74" height="52" rx="8" fill="#f9fafb"/>
      <rect x="98" y="196" width="74" height="52" rx="8" fill="#f9fafb"/>
      <circle cx="53" cy="158" r="10" fill="#07c160" fill-opacity="0.5"/>
      <circle cx="135" cy="158" r="10" fill="#07c160" fill-opacity="0.35"/>
      <circle cx="53" cy="218" r="10" fill="#07c160" fill-opacity="0.4"/>
      <circle cx="135" cy="218" r="10" fill="#07c160" fill-opacity="0.45"/>
      <rect x="16" y="262" width="156" height="28" rx="10" fill="#07c160" fill-opacity="0.12"/>
    </g>

    <!-- 增长曲线 -->
    <g transform="translate(310 248)">
      <polyline points="0,80 30,72 60,62 90,46 120,26 150,12 180,4" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round"/>
      <circle cx="180" cy="4" r="6" fill="#ffffff"/>
      <circle cx="180" cy="4" r="12" fill="#ffffff" fill-opacity="0.25"/>
    </g>

    <rect width="800" height="400" fill="url(#mp-film)"/>
  </g>
</svg>
