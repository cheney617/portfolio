<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="订阅支付体系 — 多档位定价迭代">
  <defs>
    <linearGradient id="sub-bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="oklch(28% 0.10 262)"/>
      <stop offset="0.55" stop-color="oklch(45% 0.17 260)"/>
      <stop offset="1" stop-color="oklch(62% 0.17 258)"/>
    </linearGradient>
    <linearGradient id="sub-film" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.2" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.74" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.26"/>
    </linearGradient>
    <pattern id="sub-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="sub-mask" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0.3" stop-color="#fff"/><stop offset="0.75" stop-color="#000"/>
    </radialGradient>
    <mask id="sub-gridmask"><rect width="800" height="400" fill="url(#sub-mask)"/></mask>
    <clipPath id="sub-clip"><rect width="800" height="400" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#sub-clip)">
    <rect width="800" height="400" fill="url(#sub-bg)"/>
    <rect width="800" height="400" fill="url(#sub-grid)" mask="url(#sub-gridmask)"/>

    <!-- 上升趋势标签 -->
    <text x="56" y="150" font-family="Geist, system-ui, sans-serif" font-size="92" font-weight="700" letter-spacing="-3" fill="#ffffff">+12%</text>
    <text x="60" y="190" font-family="Geist Mono, ui-monospace, monospace" font-size="20" fill="#ffffff" fill-opacity="0.62">Subscription rate</text>
    <text x="60" y="218" font-family="Geist Mono, ui-monospace, monospace" font-size="20" fill="#ffffff" fill-opacity="0.62">被订阅数</text>

    <!-- 定价档位手机 -->
    <g transform="translate(548 56) rotate(-3)">
      <rect x="0" y="0" width="200" height="328" rx="32" fill="#0c1230" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
      <rect x="78" y="14" width="44" height="8" rx="4" fill="#000"/>
      <!-- 档位 1 -->
      <rect x="20" y="44" width="160" height="58" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="36" y="62" width="44" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="36" y="78" width="68" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.34"/>
      <!-- 档位 2 (选中) -->
      <rect x="20" y="116" width="160" height="68" rx="12" fill="oklch(70% 0.15 255 / 0.28)" stroke="oklch(80% 0.12 255 / 0.6)" stroke-width="1.5"/>
      <rect x="36" y="136" width="52" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.4"/>
      <rect x="36" y="152" width="80" height="11" rx="5.5" fill="#ffffff" fill-opacity="0.55"/>
      <rect x="36" y="170" width="34" height="6" rx="3" fill="oklch(82% 0.12 255 / 0.7)"/>
      <rect x="76" y="170" width="34" height="6" rx="3" fill="oklch(82% 0.12 255 / 0.5)"/>
      <!-- 档位 3 -->
      <rect x="20" y="198" width="160" height="58" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.10"/>
      <rect x="36" y="216" width="44" height="7" rx="3.5" fill="#ffffff" fill-opacity="0.22"/>
      <rect x="36" y="232" width="88" height="9" rx="4.5" fill="#ffffff" fill-opacity="0.34"/>
      <!-- 订阅 CTA -->
      <rect x="20" y="278" width="160" height="34" rx="14" fill="oklch(78% 0.13 255 / 0.85)"/>
      <rect x="74" y="290" width="52" height="10" rx="5" fill="#0c1230" fill-opacity="0.55"/>
    </g>

    <rect width="800" height="400" fill="url(#sub-film)"/>
  </g>
</svg>
