<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="开放生态 — 四类服务产品">
  <defs>
    <linearGradient id="eco-bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="oklch(28% 0.07 200)"/>
      <stop offset="0.55" stop-color="oklch(44% 0.11 190)"/>
      <stop offset="1" stop-color="oklch(62% 0.13 180)"/>
    </linearGradient>
    <linearGradient id="eco-film" x1="0" y1="0" x2="0" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="0.2" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.74" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.26"/>
    </linearGradient>
    <pattern id="eco-grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <radialGradient id="eco-mask" cx="0.5" cy="0.4" r="0.55">
      <stop offset="0.3" stop-color="#fff"/><stop offset="0.75" stop-color="#000"/>
    </radialGradient>
    <mask id="eco-gridmask"><rect width="800" height="400" fill="url(#eco-mask)"/></mask>
    <clipPath id="eco-clip"><rect width="800" height="400"/></clipPath>
  </defs>
  <g clip-path="url(#eco-clip)">
    <rect width="800" height="400" fill="url(#eco-bg)"/>
    <rect width="800" height="400" fill="url(#eco-grid)" mask="url(#eco-gridmask)"/>

    <!-- 右侧统计 -->
    <text x="744" y="150" text-anchor="end" font-family="Geist, system-ui, sans-serif" font-size="84" font-weight="700" letter-spacing="-4" fill="#ffffff"> +100%</text>
    <text x="744" y="200" text-anchor="end" font-family="Geist Mono, ui-monospace, monospace" font-size="20" fill="#ffffff" fill-opacity="0.62">Lead tool CTR</text>
    <text x="744" y="228" text-anchor="end" font-family="Geist Mono, ui-monospace, monospace" font-size="18" fill="#ffffff" fill-opacity="0.5">留资工具CTR</text>

    <!-- 左侧 2x2 服务图标 -->
    <g transform="translate(72 96)">
      <!-- 私信 -->
      <g>
        <rect x="0" y="0" width="104" height="104" rx="22" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.16"/>
        <path d="M30 38C30 33.6 33.6 30 38 30H66C70.4 30 74 33.6 74 38V58C74 62.4 70.4 66 66 66H44L33 76V66H30V38Z" fill="oklch(80% 0.12 250 / 0.85)"/>
      </g>
      <!-- 课程 (播放) -->
      <g transform="translate(120 0)">
        <rect x="0" y="0" width="104" height="104" rx="22" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.16"/>
        <rect x="26" y="30" width="52" height="44" rx="8" fill="oklch(78% 0.12 80 / 0.85)"/>
        <polygon points="46,44 64,52 46,60" fill="#ffffff" fill-opacity="0.7"/>
      </g>
      <!-- 表单 -->
      <g transform="translate(0 120)">
        <rect x="0" y="0" width="104" height="104" rx="22" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.16"/>
        <rect x="32" y="26" width="40" height="52" rx="6" fill="oklch(72% 0.14 160 / 0.85)"/>
        <rect x="40" y="38" width="24" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.55"/>
        <rect x="40" y="50" width="18" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.4"/>
        <rect x="40" y="62" width="22" height="5" rx="2.5" fill="#ffffff" fill-opacity="0.4"/>
      </g>
      <!-- 预约 (日历) -->
      <g transform="translate(120 120)">
        <rect x="0" y="0" width="104" height="104" rx="22" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.16"/>
        <rect x="28" y="28" width="48" height="48" rx="8" fill="oklch(70% 0.13 285 / 0.85)"/>
        <rect x="28" y="28" width="48" height="15" rx="8" fill="oklch(78% 0.13 285 / 0.95)"/>
        <circle cx="44" cy="60" r="5" fill="#ffffff" fill-opacity="0.6"/>
        <circle cx="60" cy="60" r="5" fill="#ffffff" fill-opacity="0.35"/>
      </g>
    </g>

    <rect width="800" height="400" fill="url(#eco-film)"/>
  </g>
</svg>
